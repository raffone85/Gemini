<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>Football AI Analyzer v2.0</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0a0f1e; color:#e0e4f0;
      min-height:100vh; display:flex; flex-direction:column;
      background-image: radial-gradient(circle at 10% 20%, #141b2d 0%, #0a0f1e 90%);
    }
    .app-container { width:100%; max-width:900px; margin:0 auto; padding:1rem; display:flex; flex-direction:column; gap:1.2rem; }
    .header { text-align:center; padding:1rem 0.5rem; }
    .header h1 { font-size:1.8rem; font-weight:700; background:linear-gradient(135deg,#64ffda,#48b0f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .modules-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:0.7rem; }
    .module-card { background:rgba(20,27,45,0.85); backdrop-filter:blur(12px); border:1px solid rgba(72,176,247,0.15); border-radius:16px; padding:0.9rem; display:flex; flex-direction:column; align-items:center; text-align:center; transition:0.2s; }
    .module-card.loaded { border-color:#64ffda; box-shadow:0 0 20px rgba(100,255,218,0.15); }
    .module-icon { font-size:1.5rem; margin-bottom:0.3rem; }
    .module-name { font-size:0.7rem; font-weight:600; text-transform:uppercase; color:#ccd6f6; margin-bottom:0.5rem; }
    .file-input-wrapper { position:relative; width:100%; }
    .file-input-wrapper input[type="file"] { position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer; }
    .file-input-label { display:block; background:rgba(72,176,247,0.1); border:1px dashed rgba(72,176,247,0.4); border-radius:12px; padding:0.5rem; font-size:0.7rem; color:#48b0f7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .file-name { font-size:0.65rem; color:#8892b0; margin-top:0.3rem; word-break:break-all; display:none; }
    .module-card.loaded .file-name { display:block; color:#64ffda; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#3a4055; margin-top:0.3rem; }
    .module-card.loaded .status-dot { background:#64ffda; }
    .action-bar { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
    .btn { padding:0.7rem 1.8rem; border-radius:40px; font-weight:600; font-size:0.85rem; border:none; cursor:pointer; background:rgba(72,176,247,0.15); color:#ccd6f6; border:1px solid rgba(72,176,247,0.3); }
    .btn-primary { background:linear-gradient(135deg,#48b0f7,#3b82f6); color:#fff; border:none; box-shadow:0 4px 15px rgba(59,130,246,0.4); }
    .btn-primary:hover:not(:disabled) { box-shadow:0 6px 25px rgba(59,130,246,0.6); }
    .btn:disabled { opacity:0.4; cursor:not-allowed; }
    .log-console { background:rgba(10,15,25,0.9); border:1px solid rgba(72,176,247,0.2); border-radius:16px; padding:1rem; max-height:200px; overflow-y:auto; font-family:'Fira Code',monospace; font-size:0.7rem; color:#b4c2e0; }
    .log-entry { margin-bottom:0.3rem; }
    .log-entry.success { color:#64ffda; } .log-entry.warning { color:#ffd166; } .log-entry.error { color:#ff6b6b; }
    .dashboard { display:none; flex-direction:column; gap:1rem; }
    .dashboard.active { display:flex; }
    .filter-bar { display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap; background:rgba(20,27,45,0.8); border-radius:16px; padding:0.8rem; border:1px solid rgba(72,176,247,0.2); }
    .filter-bar label { font-size:0.75rem; color:#8892b0; }
    .filter-bar select, .filter-bar input { background:#0a0f1e; border:1px solid #334155; color:#e0e4f0; border-radius:8px; padding:0.4rem 0.6rem; font-size:0.75rem; }
    .tabs-container { display:flex; overflow-x:auto; gap:0.4rem; border-bottom:1px solid rgba(72,176,247,0.2); padding-bottom:0.5rem; }
    .tab-btn { padding:0.5rem 0.9rem; border-radius:20px 20px 0 0; background:transparent; color:#8892b0; font-size:0.75rem; font-weight:600; white-space:nowrap; border:1px solid transparent; cursor:pointer; }
    .tab-btn.active { background:rgba(72,176,247,0.15); color:#64ffda; border-color:rgba(72,176,247,0.4); }
    .matches-list { background:rgba(15,20,35,0.8); border-radius:16px; padding:0.8rem; max-height:400px; overflow-y:auto; }
    .match-row { display:flex; align-items:center; justify-content:space-between; padding:0.6rem; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; }
    .match-row:hover { background:rgba(72,176,247,0.05); }
    .match-teams { font-weight:600; font-size:0.8rem; flex:2; }
    .confidence-badge { font-size:0.7rem; padding:0.2rem 0.6rem; border-radius:12px; background:#1e293b; color:#64ffda; min-width:60px; text-align:center; }
    .add-cart { margin-left:0.5rem; }
    .detail-panel { display:none; background:rgba(25,32,50,0.9); border-radius:16px; padding:1rem; margin-top:0.5rem; border:1px solid #334155; }
    .detail-panel.open { display:block; }
    .detail-stats { font-size:0.75rem; display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
    .detail-motivation { font-style:italic; color:#ffd166; font-size:0.7rem; }
    .bet-slip { background:rgba(20,27,45,0.9); border-radius:16px; padding:1rem; border:1px solid #64ffda; }
    .total-quota { font-weight:700; color:#ffd166; }
    .copy-btn { background:#64ffda; color:#0a0f1e; border:none; border-radius:8px; padding:0.5rem 1rem; font-weight:600; }
    .special-section { margin-top:1rem; background:rgba(15,20,35,0.9); border-radius:16px; padding:1rem; }
    .special-table { width:100%; font-size:0.7rem; border-collapse:collapse; }
    .special-table th, .special-table td { padding:0.3rem; border-bottom:1px solid #1e293b; text-align:left; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>⚽ Football AI Analyzer v2.0</h1>
    <div class="subtitle">Carica 10 CSV – Analisi robusta</div>
  </div>
  <div class="modules-grid" id="modulesGrid"></div>
  <div class="action-bar">
    <button class="btn" id="resetBtn">🔄 Reset</button>
    <button class="btn btn-primary" id="processBtn" disabled>⚡ Analizza & Unisci</button>
  </div>
  <div class="log-console" id="logConsole"></div>
  <div class="dashboard" id="dashboard">
    <div class="filter-bar">
      <label>⏰ Ora: <input type="text" id="filterOra" placeholder="15:00" style="width:80px;"></label>
      <label>🔢 Score min: <select id="filterScore"><option value="0">Tutti</option><option value="75">≥75</option><option value="85">≥85</option></select></label>
    </div>
    <div class="tabs-container" id="marketTabs">
      <button class="tab-btn active" data-market="over05pt">Over 0.5 PT</button>
      <button class="tab-btn" data-market="gg">GG</button>
      <button class="tab-btn" data-market="over25">Over 2.5</button>
      <button class="tab-btn" data-market="under25">Under 2.5</button>
      <button class="tab-btn" data-market="multigol1_3c">MG 1-3 Casa</button>
      <button class="tab-btn" data-market="multigol1_3o">MG 1-3 Osp</button>
      <button class="tab-btn" data-market="esito">Esito Finale</button>
    </div>
    <div class="matches-list" id="matchesList"></div>
    <div class="detail-panel" id="detailPanel"></div>
    <div class="bet-slip" id="betSlip">
      <h3>🛒 Schedina</h3>
      <div id="slipItems"></div>
      <div>Quota totale: <span class="total-quota" id="totalQuota">-</span></div>
      <button class="copy-btn" id="copyTelegram">📋 Copia per Telegram</button>
    </div>
    <div class="special-section" id="specialSection">
      <h3>🔍 Giocatori & Statistiche IA</h3>
      <div class="tabs-container" id="specialTabs">
        <button class="tab-btn active" data-special="mod4">Tiri/Corner</button>
        <button class="tab-btn" data-special="mod5">Ammonizioni/Falli</button>
        <button class="tab-btn" data-special="mod6">Tiratori</button>
      </div>
      <div id="specialContent"></div>
    </div>
    <button class="btn btn-primary" id="generateSlips">🤖 Genera 5 Schedine</button>
    <div id="autoSlipsResult" style="font-size:0.75rem;"></div>
  </div>
</div>
<script>
(function() {
  const MODULES = [
    { id:'mod1', name:'Over 0.5 PT', icon:'📈' },
    { id:'mod2', name:'Partite GG/Over2.5', icon:'🥅' },
    { id:'mod3', name:'Multigol 1-3 Cris', icon:'🎯' },
    { id:'mod4', name:'Statistiche IA', icon:'📊' },
    { id:'mod5', name:'Ammonizioni/Falli', icon:'🟨' },
    { id:'mod6', name:'Tiratori', icon:'👟' },
    { id:'mod7', name:'Quote di Valore', icon:'💎' },
    { id:'mod8', name:'GZ_ALL', icon:'🧿' },
    { id:'mod9', name:'DataMiningPlus', icon:'⛏️' },
    { id:'mod10', name:'Differenziali Gol', icon:'⚖️' }
  ];

  const fileStore = new Map();
  const parsedModules = new Map();
  let aggregatedMatches = [];

  const logConsole = document.getElementById('logConsole');
  const dashboard = document.getElementById('dashboard');

  function log(msg, type='info') {
    const d = document.createElement('div');
    d.className = `log-entry ${type}`;
    d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logConsole.appendChild(d);
    logConsole.scrollTop = logConsole.scrollHeight;
  }

  // COSTRUZIONE UI MODULI
  function buildModulesUI() {
    const grid = document.getElementById('modulesGrid');
    grid.innerHTML = '';
    MODULES.forEach(mod => {
      const card = document.createElement('div');
      card.className = 'module-card';
      card.dataset.moduleId = mod.id;
      card.innerHTML = `
        <div class="module-icon">${mod.icon}</div>
        <div class="module-name">${mod.name}</div>
        <div class="file-input-wrapper">
          <input type="file" accept=".csv" id="fileInput-${mod.id}" data-module="${mod.id}">
          <label class="file-input-label">📁 Scegli CSV</label>
        </div>
        <div class="file-name" id="fileName-${mod.id}"></div>
        <div class="status-dot"></div>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll('input[type="file"]').forEach(inp => inp.addEventListener('change', handleFileSelect));
  }

  function handleFileSelect(e) {
    const inp = e.target;
    const modId = inp.dataset.module;
    const file = inp.files[0];
    const card = inp.closest('.module-card');
    const nameDisp = document.getElementById(`fileName-${modId}`);
    if (!file) {
      fileStore.delete(modId);
      card.classList.remove('loaded');
      nameDisp.textContent = ''; nameDisp.style.display = 'none';
      updateProcessBtn();
      return;
    }
    fileStore.set(modId, file);
    card.classList.add('loaded');
    nameDisp.textContent = file.name; nameDisp.style.display = 'block';
    updateProcessBtn();
  }

  function updateProcessBtn() {
    document.getElementById('processBtn').disabled = fileStore.size === 0;
  }

  function resetAll() {
    fileStore.clear(); parsedModules.clear(); aggregatedMatches = [];
    document.querySelectorAll('input[type="file"]').forEach(i => i.value = '');
    document.querySelectorAll('.module-card').forEach(c => c.classList.remove('loaded'));
    document.querySelectorAll('.file-name').forEach(e => { e.textContent = ''; e.style.display = 'none'; });
    dashboard.classList.remove('active');
    updateProcessBtn();
    logConsole.innerHTML = '';
  }

  // PARSER CSV ROBUSTO
  function removeBOM(str) { return str.replace(/^\uFEFF/, ''); }
  function detectSeparator(line) {
    const counts = { ';': (line.match(/;/g)||[]).length, ',': (line.match(/,/g)||[]).length, '\t': (line.match(/\t/g)||[]).length };
    return Object.keys(counts).reduce((a,b) => counts[a] > counts[b] ? a : b);
  }
  function cleanString(s) {
    s = s.trim();
    if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))) s = s.slice(1,-1).trim();
    return s;
  }
  function parseNumericValue(v) {
    if (typeof v !== 'string') return v;
    let s = v.trim();
    if (s.startsWith('"') && s.endsWith('"')) s = s.slice(1,-1).trim();
    if (s.includes('%')) { s = s.replace('%','').replace(',','.'); let n=parseFloat(s); return isNaN(n)?v:n/100; }
    if (/^-?\d{1,3}(?:\.\d{3})*(?:,\d+)?$/.test(s)||/^-?\d+\.\d+$/.test(s)) {
      if (s.includes('.') && s.includes(',')) s = s.replace(/\./g,'').replace(',','.');
      else if (s.includes(',') && !s.includes('.')) s = s.replace(',','.');
      let n = parseFloat(s);
      if (!isNaN(n)) return n;
    }
    return v;
  }
  function normalizeHeader(h) { return cleanString(h).toLowerCase().replace(/\s+/g, '_'); }
  function resolveDuplicateHeaders(headers) {
    const seen = new Map();
    return headers.map(h => {
      const norm = h;
      if (!seen.has(norm)) { seen.set(norm, 1); return h; }
      seen.set(norm, seen.get(norm)+1);
      return `${h}_${seen.get(norm)}`;
    });
  }

  function findColumnIndex(headers, possibleNames) {
    const normHeaders = headers.map(normalizeHeader);
    for (let name of possibleNames) {
      const idx = normHeaders.indexOf(normalizeHeader(name));
      if (idx !== -1) return idx;
    }
    return -1;
  }

  function parseCSV(text, modId) {
    text = removeBOM(text);
    const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
    if (lines.length < 2) throw new Error('File CSV vuoto o senza dati');
    const sep = detectSeparator(lines[0]);
    let headers = lines[0].split(sep).map(cleanString);
    headers = resolveDuplicateHeaders(headers);
    const rows = [];
    for (let i=1; i<lines.length; i++) {
      const vals = lines[i].split(sep);
      const row = {};
      headers.forEach((h, idx) => {
        let v = vals[idx] !== undefined ? vals[idx] : '';
        v = cleanString(v);
        row[h] = parseNumericValue(v);
      });
      rows.push(row);
    }
    const oraIdx = findColumnIndex(headers, ['ora','orario','time','kick_off']);
    const eventoIdx = findColumnIndex(headers, ['evento','match','partita','teams','squadre']);
    return { headers, rows, sep, oraCol: oraIdx!==-1 ? headers[oraIdx] : null, eventoCol: eventoIdx!==-1 ? headers[eventoIdx] : null };
  }

  function normalizeEventString(str) {
    if (!str) return '';
    return String(str).toLowerCase()
      .replace(/\s*-\s*/g, ' vs ')
      .replace(/[^a-z0-9\s]/g, '')
      .replace(/\s+/g, ' ').trim();
  }

  function fuzzyMatch(ev1, ev2, th=5) {
    const a = normalizeEventString(ev1), b = normalizeEventString(ev2);
    if (a === b) return true;
    const dist = levenshtein(a,b);
    return dist <= th;
  }
  function levenshtein(a,b) {
    const m = []; for(let i=0;i<=a.length;i++) m[i]=[i]; for(let j=0;j<=b.length;j++) m[0][j]=j;
    for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++) m[i][j] = Math.min(m[i-1][j]+1, m[i][j-1]+1, m[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
    return m[a.length][b.length];
  }

  // AGGREGAZIONE
  function findMatchRow(targetEvent, targetOra, rows, eventoCol, oraCol) {
    const normEv = normalizeEventString(targetEvent);
    const targetOraStr = String(targetOra).trim();
    const exact = rows.find(r => {
      const rEv = normalizeEventString(r[eventoCol]||'');
      const rOra = String(r[oraCol]||'').trim();
      return rEv === normEv && rOra === targetOraStr;
    });
    if (exact) return exact;
    return rows.find(r => {
      const rOra = String(r[oraCol]||'').trim();
      return rOra === targetOraStr && fuzzyMatch(targetEvent, r[eventoCol]||'');
    }) || null;
  }

  async function processAllFiles() {
    logConsole.innerHTML = '';
    log('🚀 Avvio parsing...','info');
    parsedModules.clear();
    const proms = [];
    for (let [modId, file] of fileStore) {
      proms.push(
        readFileAsText(file).then(text => {
          const p = parseCSV(text, modId);
          parsedModules.set(modId, p);
          log(`✔️ ${modId}: ${p.rows.length} righe (separatore "${p.sep}", ORA:${p.oraCol||'?'}, EVENTO:${p.eventoCol||'?'})`, 'success');
        }).catch(e => log(`❌ ${modId} (${file.name}): ${e.message}`, 'error'))
      );
    }
    await Promise.all(proms);

    if (parsedModules.size === 0) { log('❌ Nessun modulo parsato.', 'error'); return; }

    // Prendi come base il primo modulo con entrambe le colonne chiave
    let baseModId = null;
    for (let [id, p] of parsedModules) {
      if (p.oraCol && p.eventoCol) { baseModId = id; break; }
    }
    if (!baseModId) {
      log('❌ Nessun modulo possiede sia ORA che EVENTO. Aggregazione impossibile.', 'error');
      return;
    }
    const base = parsedModules.get(baseModId);
    const baseRows = base.rows;
    const matchMap = new Map();

    for (let row of baseRows) {
      const ora = String(row[base.oraCol]||'').trim();
      const ev = String(row[base.eventoCol]||'').trim();
      if (!ora || !ev) continue;
      const key = `${ora}|||${normalizeEventString(ev)}`;
      if (!matchMap.has(key)) {
        const match = { ORA:ora, EVENTO:ev, modules: {} };
        for (let [modId, p] of parsedModules) {
          if (!p.oraCol || !p.eventoCol) continue;
          const mr = findMatchRow(ev, ora, p.rows, p.eventoCol, p.oraCol);
          if (mr) match.modules[modId] = mr;
        }
        matchMap.set(key, match);
      }
    }

    // Aggiunge partite presenti solo in altri moduli
    for (let [modId, p] of parsedModules) {
      if (!p.oraCol || !p.eventoCol) continue;
      for (let row of p.rows) {
        const ora = String(row[p.oraCol]||'').trim();
        const ev = String(row[p.eventoCol]||'').trim();
        const key = `${ora}|||${normalizeEventString(ev)}`;
        if (!matchMap.has(key) && ora && ev) {
          const match = { ORA:ora, EVENTO:ev, modules: {} };
          for (let [mId, mp] of parsedModules) {
            if (!mp.oraCol || !mp.eventoCol) continue;
            const mr = findMatchRow(ev, ora, mp.rows, mp.eventoCol, mp.oraCol);
            if (mr) match.modules[mId] = mr;
          }
          matchMap.set(key, match);
        }
      }
    }

    aggregatedMatches = Array.from(matchMap.values());
    window.MatchData = aggregatedMatches;
    log(`✅ ${aggregatedMatches.length} partite aggregate da ${parsedModules.size} moduli.`, 'success');
    dashboard.classList.add('active');
    renderAllTabs();
  }

  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsText(file, 'UTF-8');
    });
  }

  // ==================== PARTE 2: MOTORE ====================
  function calcConfidenceScores(match) {
    const scores = {};
    const m1 = match.modules['mod1']||{}, m2 = match.modules['mod2']||{}, m3 = match.modules['mod3']||{};
    const m7 = match.modules['mod7']||{}, m8 = match.modules['mod8']||{}, m9 = match.modules['mod9']||{}, m10 = match.modules['mod10']||{};

    const IND = +m1.IND || 0, Delta1 = +m1.Delta || 0, Diff1 = +m1.Diff || 0;
    const IGBc = +m2.IGBc || 0, IGBo = +m2.IGBo || 0, IGBt = +m2.IGBt || 0, MGE = +m2.MGE || 0;
    const S1S2 = +m2['S1-S2'] || 0, Diff2 = +m2.Diff || 0, PGG = +m2.PGG || 0;
    const ICH = +m3.ICH || 0, ICA = +m3.ICA || 0, VarC = +m3.VarC || 0, VarO = +m3.VarO || 0;
    const GZ = +m8.GZ || 0;
    const NP = +m9.NP || 0;
    const Qr = +m10.Qr || 0, QrL = +m10.QrL || 0;
    let dropPoint = 0;
    if (Qr > 0) { const drop = (Qr - QrL) / Qr; if (drop >= 0.05) dropPoint = 4; }

    function dmWeight(marketKey) {
      if (NP < 15) return 0;
      const col = marketKey + '_perc';
      const perc = +m9[col] || 0;
      if (perc < 60) return 0;
      let w = NP >= 100 ? 1 : NP >= 60 ? 0.8 : NP >= 30 ? 0.5 : 0.2;
      return Math.min(50, perc * w);
    }

    function gzFilter(type) {
      if ((type === 'over' || type === 'gg') && GZ < -1200) return -999;
      if (type === 'over' && GZ > 5000) return 15;
      if (type === 'under' && GZ < -1800) return 15;
      return 0;
    }

    let over05 = (IND < 320 && Delta1 < -20 && Diff1 < 0) ? 50 : 0;
    let gzOv = gzFilter('over');
    over05 = gzOv === -999 ? 0 : over05 + dmWeight('over05pt') + (gzOv>0?gzOv:0) + dropPoint;
    scores.over05pt = Math.min(100, over05);

    let gg = (IGBc >= 150 && IGBo >= 150 && S1S2 < 150 && PGG >= 55) ? 50 : 0;
    let gzGg = gzFilter('gg');
    gg = gzGg === -999 ? 0 : gg + dmWeight('gg') + (gzGg>0?gzGg:0) + dropPoint;
    scores.gg = Math.min(100, gg);

    let over25 = (IGBt >= 300 && MGE >= 3 && Diff2 <= 0) ? 50 : 0;
    let gzOv25 = gzFilter('over');
    over25 = gzOv25 === -999 ? 0 : over25 + dmWeight('over25') + (gzOv25>0?gzOv25:0) + dropPoint;
    scores.over25 = Math.min(100, over25);

    let under25 = (Diff2 > 1.5 && MGE > 0 && MGE < 3) ? 50 : 0;
    let gzUn = gzFilter('under');
    under25 = gzUn === -999 ? 0 : under25 + dmWeight('under25') + (gzUn>0?gzUn:0) + dropPoint;
    scores.under25 = Math.min(100, under25);

    let mgc = (ICH >= 300 && ICH <= 350 && VarC >= 30) ? 50 : 0;
    scores.multigol1_3c = Math.min(100, mgc + dmWeight('multigol1-3c') + dropPoint);
    let mgo = (ICA >= 300 && ICA <= 350 && VarO >= 30) ? 50 : 0;
    scores.multigol1_3o = Math.min(100, mgo + dmWeight('multigol1-3o') + dropPoint);

    let esito = 0;
    const s1 = +m7['Spread1']||0, sX = +m7['SpreadX']||0, s2 = +m7['Spread2']||0;
    if (s1 >= 0.15 || sX >= 0.15 || s2 >= 0.15) esito = 40;
    esito += Math.max(dmWeight('1'), dmWeight('X'), dmWeight('2')) + dropPoint;
    scores.esito = Math.min(100, esito);

    return scores;
  }

  const MARKET_MAP = {
    over05pt: {label:'Over 0.5 PT', quotaCol:null},
    gg: {label:'GG', quotaCol:'GG_quota'},
    over25: {label:'Over 2.5', quotaCol:'Over2.5_quota'},
    under25: {label:'Under 2.5', quotaCol:'Under2.5_quota'},
    multigol1_3c: {label:'MG 1-3 Casa', quotaCol:null},
    multigol1_3o: {label:'MG 1-3 Ospite', quotaCol:null},
    esito: {label:'Esito Finale', quotaCol:'1_quota'}
  };

  function getMatchQuota(match, marketKey) {
    const col = MARKET_MAP[marketKey]?.quotaCol;
    if (!col) return null;
    return +((match.modules['mod9']||{})[col]) || null;
  }

  let currentMarket = 'over05pt';
  let cart = [];

  function renderAllTabs() {
    document.querySelectorAll('#marketTabs .tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-market="${currentMarket}"]`).classList.add('active');
    renderMarketList();
    renderSpecialContent('mod4');
  }

  function renderMarketList() {
    const container = document.getElementById('matchesList');
    const filterOra = document.getElementById('filterOra').value.trim();
    const minScore = +document.getElementById('filterScore').value;
    let matches = aggregatedMatches.map(m => {
      const scores = calcConfidenceScores(m);
      return {...m, scores};
    }).filter(m => {
      const sc = m.scores[currentMarket] || 0;
      return sc >= minScore && (!filterOra || String(m.ORA).includes(filterOra));
    }).sort((a,b) => (b.scores[currentMarket]||0) - (a.scores[currentMarket]||0));

    container.innerHTML = matches.length ? '' : '<p style="color:#8892b0;">Nessuna partita.</p>';
    matches.forEach(m => {
      const sc = m.scores[currentMarket]||0;
      const div = document.createElement('div');
      div.className = 'match-row';
      div.innerHTML = `
        <span class="match-teams">${m.EVENTO} (${m.ORA})</span>
        <span class="confidence-badge">${sc}%</span>
        <input type="checkbox" class="add-cart" data-match-id="${m.ORA}|||${normalizeEventString(m.EVENTO)}" data-market="${currentMarket}">
      `;
      div.addEventListener('click', (e) => { if(e.target.tagName!=='INPUT') showDetail(m, currentMarket); });
      container.appendChild(div);
    });
    updateCartListeners();
  }

  function showDetail(match, market) {
    const panel = document.getElementById('detailPanel');
    const scores = calcConfidenceScores(match);
    const sc = scores[market]||0;
    const m1=match.modules['mod1']||{}, m2=match.modules['mod2']||{}, m8=match.modules['mod8']||{};
    const gz = m8.GZ || '-', np = (match.modules['mod9']||{}).NP || '-';
    const dropVal = (()=>{ const m10=match.modules['mod10']||{}; return m10.Qr ? ((m10.Qr-m10.QrL)/m10.Qr*100).toFixed(1)+'%' : '-'; })();
    panel.innerHTML = `
      <h4>${match.EVENTO} - ${MARKET_MAP[market].label} (${sc}%)</h4>
      <div class="detail-stats"><div>🟢 IND: ${m1.IND||'-'}</div><div>🔵 GZ: ${gz}</div></div>
      <div class="detail-stats"><div>📉 Drop: ${dropVal}</div><div>⛏️ NP: ${np}</div></div>
      <div class="detail-motivation">📝 Punteggio basato su indicatori e validatori.</div>
      <button class="btn" onclick="document.getElementById('detailPanel').classList.remove('open')">Chiudi</button>
    `;
    panel.classList.add('open');
  }

  function updateCartListeners() {
    document.querySelectorAll('.add-cart').forEach(cb => {
      cb.onchange = function() {
        const [ora, ev] = this.dataset.matchId.split('|||');
        const market = this.dataset.market;
        const match = aggregatedMatches.find(m => m.ORA===ora && normalizeEventString(m.EVENTO)===ev);
        if (!match) return;
        if (this.checked) {
          if (!cart.find(i => i.match.ORA===ora && i.match.EVENTO===match.EVENTO && i.market===market))
            cart.push({match, market});
        } else {
          cart = cart.filter(i => !(i.match.ORA===ora && i.match.EVENTO===match.EVENTO && i.market===market));
        }
        renderCart();
      };
    });
  }

  function renderCart() {
    const slipDiv = document.getElementById('slipItems');
    const totalSpan = document.getElementById('totalQuota');
    slipDiv.innerHTML = '';
    let tot = 1;
    cart.forEach(item => {
      const q = getMatchQuota(item.match, item.market) || 1.0;
      tot *= q;
      slipDiv.innerHTML += `<div class="slip-item"><span>${item.match.EVENTO} (${MARKET_MAP[item.market].label})</span><span>${q.toFixed(2)}</span></div>`;
    });
    totalSpan.textContent = cart.length ? tot.toFixed(2) : '-';
  }

  document.getElementById('copyTelegram').addEventListener('click', () => {
    if (!cart.length) return;
    let text = '📋 *Schedina AI*\n'; let tot = 1;
    cart.forEach(i => { const q = getMatchQuota(i.match,i.market)||1; tot*=q; text += `⚽ ${i.match.EVENTO} - ${MARKET_MAP[i.market].label} @${q.toFixed(2)}\n`; });
    text += `\n💰 Quota totale: ${tot.toFixed(2)}`;
    navigator.clipboard.writeText(text).then(() => alert('Copiato!'));
  });

  function renderSpecialContent(modId) {
    const cont = document.getElementById('specialContent');
    const p = parsedModules.get(modId);
    if (!p || !p.rows.length) { cont.innerHTML = '<p style="color:#8892b0;">Nessun dato.</p>'; return; }
    const headers = p.headers;
    let html = '<table class="special-table"><thead><tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>';
    p.rows.slice(0,50).forEach(r => html += '<tr>'+headers.map(h=>`<td>${r[h]}</td>`).join('')+'</tr>');
    html += '</tbody></table>';
    cont.innerHTML = html;
  }

  document.getElementById('specialTabs').addEventListener('click', e => {
    if (e.target.classList.contains('tab-btn')) {
      document.querySelectorAll('#specialTabs .tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      renderSpecialContent(e.target.dataset.special);
    }
  });

  document.getElementById('generateSlips').addEventListener('click', () => {
    if (!aggregatedMatches.length) return;
    const all = [];
    aggregatedMatches.forEach(m => {
      const sc = calcConfidenceScores(m);
      for (let mk of Object.keys(MARKET_MAP)) {
        const s = sc[mk]||0;
        if (s < 50) continue;
        const quota = getMatchQuota(m, mk) || 1.3;
        all.push({match:m, market:mk, score:s, quota});
      }
    });
    all.sort((a,b)=>b.score-a.score);
    function build(cnt, minQ, maxQ) {
      const res = []; let tot=1;
      for (let ev of all) {
        if (res.length >= cnt) break;
        const newTot = tot * ev.quota;
        if (res.length === cnt-1 && (newTot < minQ || newTot > maxQ)) continue;
        res.push(ev); tot = newTot;
      }
      return res.length === cnt && tot >= minQ && tot <= maxQ ? {events:res, tot} : null;
    }
    const configs = [[1,1.65,1.80],[2,1.81,2.30],[3,2.30,3.00],[5,3.00,5.00],[6,5.00,99]];
    const out = configs.map(([n,min,max]) => {
      const slip = build(n,min,max);
      if (!slip) return `<div><strong>${n} eventi (${min}-${max})</strong>: ❌ non trovata</div>`;
      return `<div><strong>${n} eventi (${slip.tot.toFixed(2)})</strong>: ${slip.events.map(e=>`${e.match.EVENTO} (${MARKET_MAP[e.market].label} @${e.quota.toFixed(2)})`).join(' + ')}</div>`;
    }).join('');
    document.getElementById('autoSlipsResult').innerHTML = out;
  });

  document.getElementById('marketTabs').addEventListener('click', e => {
    if (e.target.classList.contains('tab-btn')) {
      currentMarket = e.target.dataset.market;
      renderAllTabs();
    }
  });
  document.getElementById('filterOra').addEventListener('input', renderMarketList);
  document.getElementById('filterScore').addEventListener('change', renderMarketList);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
  document.getElementById('processBtn').addEventListener('click', processAllFiles);

  buildModulesUI();
})();
</script>
</body>
</html>
